<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓步漫遊 · 街貓資料站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2563EB;--blue-dark:#1D4ED8;
  --blue-light:#EFF6FF;--blue-mid:#BFDBFE;
  --bg:#F0F6FF;--surface:#fff;--border:#E0ECFF;
  --text-1:#0F172A;--text-2:#475569;--text-3:#94A3B8;
  --r-sm:10px;--r-md:16px;--r-lg:24px;
  --sh-sm:0 1px 4px rgba(27,58,107,.08);
  --sh-md:0 4px 20px rgba(27,58,107,.12);
  --sh-lg:0 12px 40px rgba(27,58,107,.18);
}
html,body{height:100%;font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text-1);overflow:hidden}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:100;
  background:#FFFFFF;
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:0;
  box-shadow:0 2px 12px rgba(27,58,107,.07);
}
.logo-img{height:30px;width:auto;object-fit:contain;flex-shrink:0}
.header-div{width:1px;height:30px;background:var(--border);margin:0 22px}
.tab-bar{display:flex;gap:3px}
.tab{
  padding:7px 18px;border-radius:20px;
  font-size:13.5px;font-weight:500;font-family:inherit;
  cursor:pointer;border:none;background:transparent;
  color:var(--text-2);
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.tab:hover{background:var(--blue-light);color:var(--navy)}
.tab.active{background:var(--navy);color:white;font-weight:700}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sync-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--blue-light);color:var(--navy);
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22C55E}

/* ── PAGES ── */
.page{display:none;position:fixed;inset:60px 0 0 0;overflow:hidden}
.page.active{display:block}

/* ══════════════════════
   MAP PAGE
══════════════════════ */
#map-root{
  width:100%;height:100%;position:relative;
  background:#87CEEB;overflow:hidden;
  cursor:grab;
}
#map-root:active{ cursor:grabbing; }

/* 縮放容器 - 圖片和標籤一起縮放 */
#map-zoom{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  transform-origin:center center;
  will-change:transform;
}
#map-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  user-select:none;
}
#map-labels{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:10;
}
#map-labels .map-label{
  pointer-events:all;
}
.map-label{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  pointer-events:all;cursor:pointer;
}
.map-label:hover .ml-name{ background:rgba(27,58,107,.85); }
.ml-name{
  font-size:var(--label-fs, 10px);font-weight:700;
  color:white;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
  white-space:nowrap;
  font-family:'Noto Sans TC',sans-serif;
  background:rgba(0,0,0,.35);
  border-radius:4px;
  padding:2px 5px;
  transition:background .12s;
}
.ml-name.dim{
  opacity:0.5;
  font-weight:500;
  font-size:calc(var(--label-fs, 10px) * 0.85);
  background:rgba(0,0,0,.2);
}
.ml-count{
  background:#1B3A6B;
  color:white;
  font-size:var(--label-fs, 10px);font-weight:700;
  border-radius:10px;
  padding:1px 7px;
  border:1.5px solid rgba(255,255,255,.8);
  font-family:sans-serif;
  min-width:20px;text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.map-label.has-data .ml-name{
  background:rgba(27,58,107,.5);
}

#map-toolbar{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:10}
.t-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.92);border:1px solid var(--border);font-size:17px;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);transition:all .15s}
.t-btn:hover{background:white;color:var(--navy);border-color:var(--blue-mid)}

#map-legend{position:absolute;bottom:20px;left:18px;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.leg-title{font-weight:600;color:var(--text-2);margin-bottom:8px;font-size:11.5px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11.5px;color:var(--text-2)}
.leg-sw{width:32px;height:8px;border-radius:4px}

#map-stats{position:absolute;bottom:20px;right:14px;z-index:10;display:flex;flex-direction:column;gap:7px}
.m-stat{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;display:flex;align-items:center;gap:5px}
.m-stat strong{color:var(--navy);font-weight:700}

#map-tip{position:absolute;z-index:30;background:white;border:1px solid var(--border);border-radius:var(--r-md);padding:12px 15px;font-size:12.5px;box-shadow:var(--sh-md);pointer-events:none;opacity:0;transition:opacity .1s;min-width:160px}
#map-tip.show{opacity:1}
.tt-name{font-weight:700;font-size:14px;color:var(--navy);margin-bottom:7px}
.tt-row{display:flex;justify-content:space-between;gap:14px;margin-bottom:3px}
.tt-lbl{color:var(--text-3)}.tt-val{font-weight:500}

/* side panel */
#side-panel{position:absolute;top:14px;left:14px;bottom:14px;width:272px;z-index:20;background:white;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden;transform:translateX(-310px);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#side-panel.open{transform:translateX(0)}
.sp-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:13px;color:var(--text-2);display:flex;align-items:center;justify-content:center;z-index:5;transition:background .12s}
.sp-close:hover{background:var(--blue-light);color:var(--navy)}
.sp-hero{height:140px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;flex-shrink:0;overflow:hidden;position:relative}
.sp-hero img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.sp-emoji{font-size:50px;line-height:1;position:relative;z-index:1}
.sp-hint{font-size:11px;color:var(--blue);font-weight:500;position:relative;z-index:1}
.sp-body{flex:1;overflow-y:auto;padding:16px 18px 20px}
.sp-body::-webkit-scrollbar{width:3px}
.sp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sp-name{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:2px}
.sp-meta{font-size:12px;color:var(--text-3);margin-bottom:14px}
.sp-sec{margin-bottom:14px}
.sp-sec-title{font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px}
.bar-lbl{width:48px;color:var(--text-2);flex-shrink:0;font-size:11.5px}
.bar-trk{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-num{width:16px;text-align:right;color:var(--text-3);font-size:11px}
.sp-prompt{background:var(--blue-light);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--navy);line-height:1.65}
.sp-prompt-lbl{font-weight:700;font-size:10.5px;color:var(--blue);margin-bottom:3px}
.sp-tags{display:flex;flex-wrap:wrap;gap:5px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.bd-navy{background:#EFF3FF;color:var(--navy)}
.bd-orange{background:#FEF3C7;color:#92400E}
.bd-green{background:#DCFCE7;color:#166534}
.bd-gray{background:#F1F5F9;color:#475569}
.bd-dark{background:#1E293B;color:#E2E8F0}
.bd-pink{background:#FDF2F8;color:#9D174D}

/* loading state inside map */
#map-loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;pointer-events:none}
#map-loading.hidden{opacity:0;transition:opacity .4s;pointer-events:none}
.spin{width:36px;height:36px;border:3px solid var(--blue-mid);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════
   POSTCARD PAGE
══════════════════════ */
#pc-root{height:100%;overflow-y:auto;padding:28px 32px 60px}
#pc-root::-webkit-scrollbar{width:5px}
#pc-root::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pc-header{margin-bottom:24px}
.pc-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:4px}
.pc-sub{font-size:13px;color:var(--text-3)}

/* color category tabs */
.color-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.ctab{
  display:flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:20px;
  font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;border:1.5px solid var(--border);
  background:white;color:var(--text-2);transition:all .15s;
}
.ctab:hover{border-color:var(--navy);color:var(--navy)}
.ctab.active{background:var(--navy);color:white;border-color:var(--navy)}
.ctab-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ctab.active .ctab-dot{border:2px solid rgba(255,255,255,.5)}

/* grid */
.pc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}
.pc-card{background:white;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);transition:box-shadow .2s,transform .2s;cursor:pointer}
.pc-card:hover{box-shadow:var(--sh-lg);transform:translateY(-4px)}
.pc-scene{height:200px;position:relative;overflow:hidden;background:var(--blue-light)}
.pc-scene img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.pc-card:hover .pc-scene img{transform:scale(1.05)}
.pc-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:white;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500}
.pc-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.pc-ph-emoji{font-size:44px}
.pc-ph-text{font-size:12px;color:var(--blue);font-weight:500}
.pc-ph-sub{font-size:10.5px;color:var(--text-3);text-align:center;padding:0 16px}
.pc-info{padding:14px 16px 10px}
.pc-name{font-size:14.5px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.pc-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pc-meta{font-size:11.5px;color:var(--text-3);margin-bottom:9px}
.pc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pc-acts{display:flex;gap:8px;padding:0 16px 14px}
.pc-btn{flex:1;padding:7px 10px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid var(--border);background:white;color:var(--text-2)}
.pc-btn:hover{border-color:var(--navy);color:var(--navy)}
.pc-btn.primary{background:var(--navy);color:white;border-color:var(--navy)}
.pc-btn.primary:hover{background:var(--blue-dark)}

/* lightbox */
#lb{position:fixed;inset:0;z-index:200;background:rgba(5,10,30,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
#lb.show{display:flex}
.lb-box{background:white;border-radius:var(--r-lg);max-width:860px;width:100%;max-height:95vh;overflow-y:auto;box-shadow:var(--sh-lg);position:relative}
.lb-img{height:520px;background:var(--blue-light);border-radius:var(--r-lg) var(--r-lg) 0 0;overflow:hidden}
.lb-img img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.lb-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.85);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.lb-body{padding:20px 24px 24px}
.lb-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:3px}
.lb-sub{font-size:12.5px;color:var(--text-3);margin-bottom:14px}
.lb-prompt{background:var(--blue-light);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--navy);line-height:1.7;margin-bottom:16px}
.lb-prompt-lbl{font-weight:700;font-size:10.5px;color:var(--blue);margin-bottom:4px}
.lb-acts{display:flex;gap:10px}
.lb-btn{flex:1;padding:10px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid var(--border);background:white;color:var(--text-2)}
.lb-btn.primary{background:var(--navy);color:white;border-color:var(--navy)}
.lb-btn.primary:hover{background:var(--blue-dark)}
</style>
</head>

// ── 地圖縮放平移變數 ─────────────────────────────────────
const mapRoot = document.getElementById('map-root');
const mapZoom = document.getElementById('map-zoom');
let scale = 1, tx = 0, ty = 0;
let dragging = false, dx = 0, dy = 0, dtx = 0, dty = 0;

function applyT() {
  mapZoom.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  buildMapLabels();
}

// 滾輪縮放（最小 scale = 1，不露出空白）
mapRoot.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapRoot.getBoundingClientRect();
  const mx = e.clientX - rect.left - rect.width/2;
  const my = e.clientY - rect.top  - rect.height/2;
  const delta = e.deltaY < 0 ? 1.12 : 0.89;
  const ns = Math.max(1, Math.min(10, scale * delta));
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  clampTranslate();
  applyT();
}, { passive: false });

function clampTranslate() {
  // 限制平移範圍，確保圖片始終填滿容器
  const rect = mapRoot.getBoundingClientRect();
  const maxTx = rect.width  * (scale - 1) / 2;
  const maxTy = rect.height * (scale - 1) / 2;
  tx = Math.max(-maxTx, Math.min(maxTx, tx));
  ty = Math.max(-maxTy, Math.min(maxTy, ty));
}

// 拖曳平移
mapRoot.addEventListener('mousedown', e => {
  if (e.target.closest('.map-label')) return;
  dragging = true; dx = e.clientX; dy = e.clientY; dtx = tx; dty = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = dtx + e.clientX - dx; ty = dty + e.clientY - dy;
  clampTranslate();
  applyT();
});
window.addEventListener('mouseup', () => { dragging = false; });

// 觸控
let lastDist = 0;
mapRoot.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  else { dragging=true; dx=e.touches[0].clientX; dy=e.touches[0].clientY; dtx=tx; dty=ty; }
}, {passive:true});
mapRoot.addEventListener('touchmove', e => {
  if (e.touches.length===2) { const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); scale=Math.max(1,Math.min(10,scale*d/lastDist)); lastDist=d; clampTranslate(); applyT(); }
  else if(dragging){ tx=dtx+e.touches[0].clientX-dx; ty=dty+e.touches[0].clientY-dy; clampTranslate(); applyT(); }
},{passive:true});
mapRoot.addEventListener('touchend',()=>{dragging=false;});

function buildMapLabels() {
  const container = document.getElementById('map-labels');
  container.innerHTML = '';

  Object.entries(MAP_POSITIONS).forEach(([name, pos]) => {
    const dd = DD[name] || {};
    const hasData = dd.count > 0;

    const el = document.createElement('div');
    el.className = 'map-label' + (hasData ? ' has-data' : '');
    el.dataset.name = name;
    // 計算標籤在螢幕上的實際位置
    // pos.x/y 是圖片比例座標 (0-1)
    // 圖片在 map-zoom 裡是 100%x100% object-fit:cover
    // map-zoom 的 transform = translate(tx,ty) scale(scale)
    const rootW = mapRoot.offsetWidth;
    const rootH = mapRoot.offsetHeight;
    const imgX = rootW/2 + tx + (pos.x - 0.5) * rootW * scale;
    const imgY = rootH/2 + ty + (pos.y - 0.5) * rootH * scale;
    el.style.left = imgX + 'px';
    el.style.top  = imgY + 'px';
    // 字體大小：隨縮放調整但有上下限
    const fontSize = Math.min(13, Math.max(9, 10 * Math.sqrt(scale)));
    el.style.setProperty('--label-fs', fontSize + 'px');
    el.style.transform = 'translate(-50%,-50%)';

    if (hasData) {
      el.innerHTML = `<div class="ml-name">${name}</div><div class="ml-count">${dd.count}</div>`;
    } else {
      el.innerHTML = `<div class="ml-name dim">${name}</div>`;
    }

    el.addEventListener('mouseenter', function() {
      const topC = Object.entries(dd.colors||{}).sort((a,b)=>b[1]-a[1])[0];
      const tip  = document.getElementById('map-tip');
      const root = mapRoot.getBoundingClientRect();
      const r    = el.getBoundingClientRect();
      document.getElementById('tt-name').textContent  = name;
      document.getElementById('tt-count').textContent = (dd.count||0) + ' 筆';
      document.getElementById('tt-color').textContent = topC ? topC[0] : '—';
      document.getElementById('tt-pose').textContent  = (dd.poses||[])[0] || '—';
      let tipX = r.right - root.left + 8;
      let tipY = r.top - root.top - 10;
      if (tipX + 200 > root.width) tipX = r.left - root.left - 210;
      if (tipY < 8) tipY = 8;
      tip.style.left = tipX + 'px';
      tip.style.top  = tipY + 'px';
      tip.classList.add('show');
    });
    el.addEventListener('mouseleave', function() {
      document.getElementById('map-tip').classList.remove('show');
    });
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      fillPanel(name);
      document.getElementById('side-panel').classList.add('open');
    });

    container.appendChild(el);
  });
}

function buildColorTabs(){

    btn.className = 'ctab'+(c==='all'?' active':'');

      btn.innerHTML = `全部 <span class="badge bd-navy" style="margin-left:4px">${POSTCARDS.length}</span>`;

function doShare(){
  if(navigator.share) navigator.share({title:'貓步漫遊街貓明信片',url:location.href});
  else navigator.clipboard.writeText(location.href).then(()=>alert('連結已複製！'));
}

// ── 啟動：從 /api/stats 拉真實數據 ─────────────────────
async function loadStats() {
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    // 更新總回報數
    document.getElementById('stat-total').textContent = data.total + ' 筆';

    // 把 API 回傳的各區統計合併進 DD
    Object.entries(data.districts).forEach(([name, s]) => {
      if (DD[name]) {
        DD[name].count    = s.count;
        DD[name].colors   = s.colorCnt  || {};
        DD[name].poses    = Object.keys(s.poseCnt || {}).sort((a,b)=>(s.poseCnt[b]||0)-(s.poseCnt[a]||0));
        DD[name].envs     = s.envCnt    || {};
        DD[name].topColor = s.topColor;
        DD[name].topPose  = s.topPose;
        DD[name].topEnv   = s.topEnv;
        if (s.landmark) DD[name].landmark = s.landmark;
      }
    });

    // 更新明信片資料
    if (data.postcards?.length) {
      POSTCARDS.length = 0;
      data.postcards.forEach((p, i) => {
        POSTCARDS.push({
          id: i,
          color:    p.color,
          colorZh:  p.colorZh,
          env:      p.env,
          envKey:   p.env,
          district: p.district,
          pose:     p.pose || '坐著發呆',
          count:    p.count,
          img:      p.img || null,
          prompt:   p.prompt,
        });
      });
    }

    // 重新渲染地圖標籤
    if (window._rebuildMapLabels) window._rebuildMapLabels();
    // 重新渲染明信片
    renderPC();

    console.log('✅ 數據載入完成', data.total, '筆回報');

  } catch (err) {
    console.warn('API 載入失敗，使用預設資料:', err.message);
    // fallback: 用 DD 裡的預設資料
    renderPC();
  }
}



// 初始化明信片（API 載入前先顯示預設資料）
renderPC();

loadStats();

window.addEventListener('resize', () => { buildMapLabels(); });
</script>
